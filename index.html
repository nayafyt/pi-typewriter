<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>π Cover</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 50% 30%, #0A1428, #02050E 70%);
    color: #B0F0FF;
    font-family: 'Fira Sans', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 40px 20px;
  }
  h1 {
    margin: 0;
    font-size: 13px;
    letter-spacing: 4px;
    color: #00E5FF;
    text-transform: uppercase;
    opacity: 0.85;
  }
  #stage {
    width: 1584px;
    max-width: 95vw;
    aspect-ratio: 1584 / 396;
    border-radius: 4px;
    overflow: hidden;
    background: #02050E;
    box-shadow: 0 0 60px rgba(0, 229, 255, 0.18),
                0 0 0 1px rgba(0, 229, 255, 0.2);
  }
  canvas { display: block; width: 100%; height: 100%; }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    background: rgba(0, 229, 255, 0.06);
    border: 1px solid #00E5FF;
    color: #B0F0FF;
    padding: 10px 20px;
    font: 11px/1 'Fira Sans', sans-serif;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
  }
  button:hover {
    background: rgba(0, 229, 255, 0.18);
    box-shadow: 0 0 16px rgba(0, 229, 255, 0.35);
  }
  .hint {
    font: 11px ui-monospace, monospace;
    letter-spacing: 1px;
    opacity: 0.55;
  }
</style>
</head>
<body>
  <h1>π Typewriter · 1584 × 396</h1>
  <div id="stage"><canvas id="cover" width="1584" height="396"></canvas></div>
  <div class="controls">
    <button id="save">Download PNG</button>
    <button id="restart">Restart</button>
    <button id="pause">Pause</button>
    <button id="palette">Palette</button>
    <button id="density">Density</button>
    <button id="speed">Speed</button>
  </div>
  <div class="hint" id="src">loading…</div>

<script>
(() => {
  const canvas = document.getElementById('cover');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  // First 1000 digits of π — used immediately so the canvas types instantly.
  // pi.delivery extends this buffer sequentially as we approach the end.
  const PI_FALLBACK = "31415926535897932384626433832795028841971693993751058209749445923078164062862089986280348253421170679821480865132823066470938446095505822317253594081284811174502841027019385211055596446229489549303819644428810975665933446128475648233786783165271201909145648566923460348610454326648213393607260249141273724587006606315588174881520920962829254091715364367892590360011330530548820466521384146951941511609433057270365759591953092186117381932611793105118548074462379962749567351885752724891227938183011949129833673362440656643086021394946395224737190702179860943702770539217176293176752384674818467669405132000568127145263560827785771342757789609173637178721468440901224953430146549585371050792279689258923542019956112129021960864034418159813629774771309960518707211349999983729780499510597317328160963185950244594553469083026425223082533446850352619311881710100031378387528865875332083814206171776691473035982534904287554687311595628638823537875937519577818577053217122680661300192787661119590921642019893809525720";

  const PALETTES = [
    { name: 'navy / purple / grey', bg: '#0A1428', main: '#A78BFA', accent: '#E6EAF0' },
    { name: 'cyan / violet',        bg: '#04081A', main: '#00E5FF', accent: '#7B68EE' },
    { name: 'navy / mint',          bg: '#040E16', main: '#3DDCAA', accent: '#5BA8FF' },
    { name: 'solar / ultraviolet',  bg: '#14041C', main: '#FF7A3D', accent: '#A24DFF' },
    { name: 'arctic / aurora',      bg: '#06141E', main: '#7DFFD1', accent: '#5BA8FF' },
  ];

  const DENSITIES = [
    { name: 'sparse', cell: 22, fontSize: 18 },
    { name: 'medium', cell: 16, fontSize: 14 },
    { name: 'dense',  cell: 12, fontSize: 11 },
  ];

  const SPEEDS = [
    { name: 'slow',   step: 2 },
    { name: 'normal', step: 5 },
    { name: 'fast',   step: 12 },
  ];

  // State
  let piBuffer = PI_FALLBACK;
  let fetching = false;
  let fetchFailed = false;

  let palIdx = 0;
  let denIdx = 1;
  let spdIdx = 1;
  let paused = false;

  let charW = 0;
  let cellH = 0;
  let fontSize = 0;
  let cols = 0;
  let rows = 0;

  let currentRow = 0;
  let currentCol = 0;
  let typedCount = 0;
  let cycleCount = 0;
  let prevCursor = null;

  // Fetch the next sequential chunk of π from Google's pi.delivery API.
  async function pullMorePi() {
    if (fetching || fetchFailed) return;
    fetching = true;
    const start = piBuffer.length;
    const chunkSize = 1000;
    const chunks = 5;
    try {
      const results = await Promise.all(
        Array.from({ length: chunks }, (_, i) =>
          fetch(`https://api.pi.delivery/v1/pi?start=${start + i * chunkSize}&numberOfDigits=${chunkSize}`)
            .then(r => r.json())
            .then(d => d.content)
        )
      );
      piBuffer += results.join('');
    } catch (e) {
      fetchFailed = true;
    } finally {
      fetching = false;
    }
  }

  // Recompute grid for current density and clear the canvas.
  function setup() {
    const den = DENSITIES[denIdx];
    fontSize = den.fontSize;
    ctx.font = `bold ${fontSize}px ui-monospace, monospace`;
    const naturalCharW = ctx.measureText('0').width;

    // Pick the column/row counts from the natural sizes, then stretch each
    // cell so the grid covers the full 1584×396 with no leftover bg strip.
    cols = Math.floor(W / naturalCharW);
    rows = Math.floor(H / den.cell);
    charW = W / cols;
    cellH = H / rows;

    ctx.fillStyle = PALETTES[palIdx].bg;
    ctx.fillRect(0, 0, W, H);

    currentRow = 0;
    currentCol = 0;
    typedCount = 0;
    cycleCount = 0;
    prevCursor = null;
  }

  // Clear one cell and paint a single character into it.
  function paintCell(row, col, ch, color) {
    const x = col * charW;
    const y = row * cellH;
    ctx.fillStyle = PALETTES[palIdx].bg;
    ctx.fillRect(x, y, charW, cellH);
    ctx.fillStyle = color;
    ctx.fillText(ch, x, y + (cellH - fontSize) / 2);
  }

  // Main render loop — types `step` chars per frame, paints the latest in accent.
  function loop() {
    if (paused) {
      requestAnimationFrame(loop);
      return;
    }

    const pal = PALETTES[palIdx];
    const stepsPerFrame = SPEEDS[spdIdx].step;

    ctx.font = `bold ${fontSize}px ui-monospace, monospace`;
    ctx.textBaseline = 'top';

    // Revert the previous cursor to the main color before drawing new chars.
    if (prevCursor) {
      paintCell(prevCursor.row, prevCursor.col, prevCursor.ch, pal.main);
      prevCursor = null;
    }

    let lastRow = -1;
    let lastCol = -1;
    let lastCh = '';

    for (let s = 0; s < stepsPerFrame; s++) {
      const ch = piBuffer[typedCount % piBuffer.length];
      paintCell(currentRow, currentCol, ch, pal.main);

      lastRow = currentRow;
      lastCol = currentCol;
      lastCh = ch;

      typedCount++;
      currentCol++;
      if (currentCol >= cols) {
        currentCol = 0;
        currentRow++;
        if (currentRow >= rows) {
          currentRow = 0;
          cycleCount++;
        }
      }
    }

    // Paint the new cursor — the most recent char in accent color.
    if (lastRow >= 0) {
      paintCell(lastRow, lastCol, lastCh, pal.accent);
      prevCursor = { row: lastRow, col: lastCol, ch: lastCh };
    }

    // Top up the buffer well before it runs out.
    if (!fetching && !fetchFailed && piBuffer.length - typedCount < 1500) {
      pullMorePi();
    }

    const source = fetchFailed
      ? 'offline'
      : piBuffer.length > PI_FALLBACK.length
        ? 'pi.delivery'
        : 'fetching…';
    document.getElementById('src').textContent =
      `${pal.name} · ${DENSITIES[denIdx].name} · ${SPEEDS[spdIdx].name}` +
      ` · digit ${typedCount.toLocaleString()} · cycle ${cycleCount} · ${source}`;

    requestAnimationFrame(loop);
  }

  // --- Init ---
  setup();
  requestAnimationFrame(loop);
  pullMorePi();

  // --- Controls ---
  document.getElementById('restart').onclick = setup;

  document.getElementById('palette').onclick = () => {
    palIdx = (palIdx + 1) % PALETTES.length;
    setup();
  };

  document.getElementById('density').onclick = () => {
    denIdx = (denIdx + 1) % DENSITIES.length;
    setup();
  };

  document.getElementById('speed').onclick = () => {
    spdIdx = (spdIdx + 1) % SPEEDS.length;
  };

  const pauseBtn = document.getElementById('pause');
  pauseBtn.onclick = () => {
    paused = !paused;
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
  };

  document.getElementById('save').onclick = () => {
    canvas.toBlob((blob) => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      const slug = PALETTES[palIdx].name.replace(/[\/\s]+/g, '-');
      a.download = `pi_cover_${slug}.png`;
      a.click();
    });
  };
})();
</script>
</body>
</html>
