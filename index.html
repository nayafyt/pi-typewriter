<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>π Cover</title>
<script>
  (function () {
    var t = localStorage.getItem('theme');
    if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  })();
</script>
<style>
  :root {
    --tw-bg-start: #F8F8F8;
    --tw-bg-end: #F0F0F0;
    --tw-fg: #1A1A1A;
    --tw-muted: #6B6B6B;
    --tw-accent: #1E3A5F;
    --tw-border: #E0E0E0;
    --tw-stage-bg: #F8F8F8;
    --tw-button-bg: rgba(30, 58, 95, 0.06);
    --tw-button-hover: rgba(30, 58, 95, 0.14);
    --tw-glow: rgba(30, 58, 95, 0.14);
  }
  html.dark {
    --tw-bg-start: #161616;
    --tw-bg-end: #0C0C0C;
    --tw-fg: #EDEDED;
    --tw-muted: #8A8A8A;
    --tw-accent: #A5B8D4;
    --tw-border: #2A2A2A;
    --tw-stage-bg: #0C0C0C;
    --tw-button-bg: rgba(165, 184, 212, 0.08);
    --tw-button-hover: rgba(165, 184, 212, 0.18);
    --tw-glow: rgba(165, 184, 212, 0.18);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 50% 30%, var(--tw-bg-start), var(--tw-bg-end) 70%);
    color: var(--tw-fg);
    font-family: 'Fira Sans', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 40px 20px;
    transition: background 0.3s ease, color 0.3s ease;
  }
  h1 {
    margin: 0;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--tw-accent);
    text-transform: uppercase;
    opacity: 0.85;
    flex: 1;
    text-align: center;
    margin-left: 36px;
  }
  .title-row {
    width: 1584px;
    max-width: 95vw;
    display: flex;
    align-items: center;
    gap: 0;
  }
  #stage {
    width: 1584px;
    max-width: 95vw;
    aspect-ratio: 1584 / 396;
    border-radius: 4px;
    overflow: hidden;
    background: var(--tw-stage-bg);
    box-shadow: 0 0 60px var(--tw-glow),
                0 0 0 1px var(--tw-border);
    transition: background 0.3s ease, box-shadow 0.3s ease;
  }
  canvas { display: block; width: 100%; height: 100%; }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    background: var(--tw-button-bg);
    border: 1px solid var(--tw-accent);
    color: var(--tw-fg);
    padding: 10px 20px;
    font: 11px/1 'Fira Sans', sans-serif;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s ease, box-shadow 0.2s ease;
  }
  button:hover {
    background: var(--tw-button-hover);
    box-shadow: 0 0 16px var(--tw-glow);
  }
  .hint {
    font: 11px ui-monospace, monospace;
    letter-spacing: 1px;
    color: var(--tw-muted);
  }
  .theme-toggle {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    padding: 0;
    background: transparent;
    border: none;
    border-radius: 8px;
    color: var(--tw-muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: color 0.2s ease;
  }
  .theme-toggle:hover {
    background: transparent;
    box-shadow: none;
    color: var(--tw-accent);
  }
  .theme-toggle svg {
    width: 18px;
    height: 18px;
  }
</style>
</head>
<body>
  <div class="title-row">
    <h1>π Typewriter · 1584 × 396</h1>
    <button id="theme" class="theme-toggle" aria-label="Toggle theme"></button>
  </div>
  <div id="stage"><canvas id="cover" width="1584" height="396"></canvas></div>
  <div class="controls">
    <button id="save">Download PNG</button>
    <button id="restart">Restart</button>
    <button id="pause">Pause</button>
    <button id="palette">Palette</button>
    <button id="density">Density</button>
    <button id="speed">Speed</button>
  </div>
  <div class="hint" id="src">loading…</div>

<script>
(() => {
  const canvas = document.getElementById('cover');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  // First 1000 digits of π — used immediately so the canvas types instantly.
  // pi.delivery extends this buffer sequentially as we approach the end.
  const PI_FALLBACK = "31415926535897932384626433832795028841971693993751058209749445923078164062862089986280348253421170679821480865132823066470938446095505822317253594081284811174502841027019385211055596446229489549303819644428810975665933446128475648233786783165271201909145648566923460348610454326648213393607260249141273724587006606315588174881520920962829254091715364367892590360011330530548820466521384146951941511609433057270365759591953092186117381932611793105118548074462379962749567351885752724891227938183011949129833673362440656643086021394946395224737190702179860943702770539217176293176752384674818467669405132000568127145263560827785771342757789609173637178721468440901224953430146549585371050792279689258923542019956112129021960864034418159813629774771309960518707211349999983729780499510597317328160963185950244594553469083026425223082533446850352619311881710100031378387528865875332083814206171776691473035982534904287554687311595628638823537875937519577818577053217122680661300192787661119590921642019893809525720";

  // First palette is dynamic and follows the site theme (same tokens as nayafyt.com).
  // Light: navy accent on near-white. Dark: pale navy on near-black.
  const SITE_LIGHT = { bg: '#F8F8F8', main: '#1E3A5F', accent: '#1A1A1A' };
  const SITE_DARK  = { bg: '#0C0C0C', main: '#A5B8D4', accent: '#EDEDED' };

  function sitePalette() {
    const dark = document.documentElement.classList.contains('dark');
    const c = dark ? SITE_DARK : SITE_LIGHT;
    return { name: dark ? 'site · dark' : 'site · light', ...c };
  }

  const PALETTES = [
    { name: 'site', dynamic: true },
    { name: 'navy / purple / grey', bg: '#0A1428', main: '#A78BFA', accent: '#E6EAF0' },
    { name: 'cyan / violet',        bg: '#04081A', main: '#00E5FF', accent: '#7B68EE' },
    { name: 'navy / mint',          bg: '#040E16', main: '#3DDCAA', accent: '#5BA8FF' },
    { name: 'solar / ultraviolet',  bg: '#14041C', main: '#FF7A3D', accent: '#A24DFF' },
    { name: 'arctic / aurora',      bg: '#06141E', main: '#7DFFD1', accent: '#5BA8FF' },
  ];

  function currentPalette() {
    const p = PALETTES[palIdx];
    return p.dynamic ? sitePalette() : p;
  }

  const DENSITIES = [
    { name: 'sparse', cell: 22, fontSize: 18 },
    { name: 'medium', cell: 16, fontSize: 14 },
    { name: 'dense',  cell: 12, fontSize: 11 },
  ];

  const SPEEDS = [
    { name: 'slow',   step: 2 },
    { name: 'normal', step: 5 },
    { name: 'fast',   step: 12 },
  ];

  // State
  let piBuffer = PI_FALLBACK;
  let fetching = false;
  let fetchFailed = false;

  let palIdx = 0;
  let denIdx = 1;
  let spdIdx = 1;
  let paused = false;

  let charW = 0;
  let cellH = 0;
  let fontSize = 0;
  let cols = 0;
  let rows = 0;

  let currentRow = 0;
  let currentCol = 0;
  let typedCount = 0;
  let cycleCount = 0;
  let prevCursor = null;

  // Fetch the next sequential chunk of π from Google's pi.delivery API.
  async function pullMorePi() {
    if (fetching || fetchFailed) return;
    fetching = true;
    const start = piBuffer.length;
    const chunkSize = 1000;
    const chunks = 5;
    try {
      const results = await Promise.all(
        Array.from({ length: chunks }, (_, i) =>
          fetch(`https://api.pi.delivery/v1/pi?start=${start + i * chunkSize}&numberOfDigits=${chunkSize}`)
            .then(r => r.json())
            .then(d => d.content)
        )
      );
      piBuffer += results.join('');
    } catch (e) {
      fetchFailed = true;
    } finally {
      fetching = false;
    }
  }

  // Recompute grid for current density and clear the canvas.
  function setup() {
    const den = DENSITIES[denIdx];
    fontSize = den.fontSize;
    ctx.font = `bold ${fontSize}px ui-monospace, monospace`;
    const naturalCharW = ctx.measureText('0').width;

    // Pick the column/row counts from the natural sizes, then stretch each
    // cell so the grid covers the full 1584×396 with no leftover bg strip.
    cols = Math.floor(W / naturalCharW);
    rows = Math.floor(H / den.cell);
    charW = W / cols;
    cellH = H / rows;

    ctx.fillStyle = currentPalette().bg;
    ctx.fillRect(0, 0, W, H);

    currentRow = 0;
    currentCol = 0;
    typedCount = 0;
    cycleCount = 0;
    prevCursor = null;
  }

  // Clear one cell and paint a single character into it.
  function paintCell(row, col, ch, color) {
    const x = col * charW;
    const y = row * cellH;
    ctx.fillStyle = currentPalette().bg;
    ctx.fillRect(x, y, charW, cellH);
    ctx.fillStyle = color;
    ctx.fillText(ch, x, y + (cellH - fontSize) / 2);
  }

  // Main render loop — types `step` chars per frame, paints the latest in accent.
  function loop() {
    if (paused) {
      requestAnimationFrame(loop);
      return;
    }

    const pal = currentPalette();
    const stepsPerFrame = SPEEDS[spdIdx].step;

    ctx.font = `bold ${fontSize}px ui-monospace, monospace`;
    ctx.textBaseline = 'top';

    // Revert the previous cursor to the main color before drawing new chars.
    if (prevCursor) {
      paintCell(prevCursor.row, prevCursor.col, prevCursor.ch, pal.main);
      prevCursor = null;
    }

    let lastRow = -1;
    let lastCol = -1;
    let lastCh = '';

    for (let s = 0; s < stepsPerFrame; s++) {
      const ch = piBuffer[typedCount % piBuffer.length];
      paintCell(currentRow, currentCol, ch, pal.main);

      lastRow = currentRow;
      lastCol = currentCol;
      lastCh = ch;

      typedCount++;
      currentCol++;
      if (currentCol >= cols) {
        currentCol = 0;
        currentRow++;
        if (currentRow >= rows) {
          currentRow = 0;
          cycleCount++;
        }
      }
    }

    // Paint the new cursor — the most recent char in accent color.
    if (lastRow >= 0) {
      paintCell(lastRow, lastCol, lastCh, pal.accent);
      prevCursor = { row: lastRow, col: lastCol, ch: lastCh };
    }

    // Top up the buffer well before it runs out.
    if (!fetching && !fetchFailed && piBuffer.length - typedCount < 1500) {
      pullMorePi();
    }

    const source = fetchFailed
      ? 'offline'
      : piBuffer.length > PI_FALLBACK.length
        ? 'pi.delivery'
        : 'fetching…';
    document.getElementById('src').textContent =
      `${pal.name} · ${DENSITIES[denIdx].name} · ${SPEEDS[spdIdx].name}` +
      ` · digit ${typedCount.toLocaleString()} · cycle ${cycleCount} · ${source}`;

    requestAnimationFrame(loop);
  }

  // --- Init ---
  setup();
  requestAnimationFrame(loop);
  pullMorePi();

  // --- Theme syncing with the portfolio site ---
  // The site palette repaints when the theme changes; other palettes stay put.
  const SUN_ICON = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>';
  const MOON_ICON = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>';

  const themeBtn = document.getElementById('theme');

  function renderThemeIcon() {
    const isDark = document.documentElement.classList.contains('dark');
    themeBtn.innerHTML = isDark ? SUN_ICON : MOON_ICON;
    themeBtn.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
  }

  function applyTheme(theme) {
    document.documentElement.classList.toggle('dark', theme === 'dark');
    renderThemeIcon();
    if (PALETTES[palIdx].dynamic) setup();
  }

  renderThemeIcon();

  // Live-update when the portfolio toggles theme in another tab.
  window.addEventListener('storage', (e) => {
    if (e.key === 'theme') applyTheme(e.newValue);
  });

  // --- Controls ---
  document.getElementById('restart').onclick = setup;

  document.getElementById('palette').onclick = () => {
    palIdx = (palIdx + 1) % PALETTES.length;
    setup();
  };

  document.getElementById('density').onclick = () => {
    denIdx = (denIdx + 1) % DENSITIES.length;
    setup();
  };

  document.getElementById('speed').onclick = () => {
    spdIdx = (spdIdx + 1) % SPEEDS.length;
  };

  themeBtn.onclick = () => {
    const next = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
    localStorage.setItem('theme', next);
    applyTheme(next);
  };

  const pauseBtn = document.getElementById('pause');
  pauseBtn.onclick = () => {
    paused = !paused;
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
  };

  document.getElementById('save').onclick = () => {
    canvas.toBlob((blob) => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      const pal = currentPalette();
      const slug = pal.name.replace(/[\/\s·]+/g, '-');
      a.download = `pi_cover_${slug}.png`;
      a.click();
    });
  };
})();
</script>
</body>
</html>
